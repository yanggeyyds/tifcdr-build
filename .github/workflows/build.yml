name: Build potrace & vtracer for ARM64

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  potrace-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu make autoconf libtool
      - run: |
          curl -L https://sourceforge.net/projects/potrace/files/potrace-1.16.tar.gz | tar -xz -C /home/runner/
          cd /home/runner/potrace-1.16
          ./configure --host=aarch64-linux-gnu --disable-zlib
          make -j$(nproc)
      - uses: actions/upload-artifact@v4
        with:
          name: potrace
          path: /home/runner/potrace-1.16/potrace

  vtracer-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - run: |
          . "$HOME/.cargo/env"
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          git clone https://github.com/visioncortex/vtracer.git /home/runner/vtracer
          cd /home/runner/vtracer
          cargo build --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/vtracer /home/runner/vtracer-aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: vtracer-aarch64
          path: /home/runner/vtracer-aarch64
